<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ufficio Tecnico — Marco</title>
<style>
  :root {
    --verde: #2d6a4f;
    --verde-light: #40916c;
    --verde-pale: #d8f3dc;
    --verde-dark: #1b4332;
    --bianco: #ffffff;
    --grigio-bg: #f8f9fa;
    --grigio-border: #e0e0e0;
    --grigio-testo: #555;
    --testo: #1a1a1a;
    --radius: 12px;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--grigio-bg);
    color: var(--testo);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    background: var(--verde-dark);
    color: white;
    padding: 0 24px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-circle {
    width: 40px;
    height: 40px;
    background: var(--verde-light);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 16px;
    color: white;
    flex-shrink: 0;
  }

  .header-title {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0.3px;
  }

  .header-sub {
    font-size: 12px;
    opacity: 0.7;
    margin-top: 1px;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    background: #69db7c;
    border-radius: 50%;
    display: inline-block;
    margin-right: 6px;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .status-text {
    font-size: 13px;
    opacity: 0.85;
  }

  .chat-container {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }

  .message {
    display: flex;
    gap: 10px;
    max-width: 820px;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message.user {
    align-self: flex-end;
    flex-direction: row-reverse;
  }

  .message.marco {
    align-self: flex-start;
  }

  .avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 700;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .avatar.marco-av {
    background: var(--verde);
    color: white;
  }

  .avatar.user-av {
    background: #dee2e6;
    color: #495057;
  }

  .bubble {
    padding: 12px 16px;
    border-radius: var(--radius);
    font-size: 15px;
    line-height: 1.6;
    max-width: 680px;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .message.marco .bubble {
    background: var(--bianco);
    border: 1px solid var(--grigio-border);
    border-top-left-radius: 4px;
    box-shadow: var(--shadow);
    color: var(--testo);
  }

  .message.user .bubble {
    background: var(--verde);
    color: white;
    border-top-right-radius: 4px;
  }

  .bubble img {
    max-width: 300px;
    border-radius: 8px;
    margin-top: 8px;
    display: block;
  }

  .typing-indicator {
    display: flex;
    gap: 10px;
    align-items: center;
    align-self: flex-start;
  }

  .typing-dots {
    background: var(--bianco);
    border: 1px solid var(--grigio-border);
    border-radius: var(--radius);
    border-top-left-radius: 4px;
    padding: 14px 18px;
    display: flex;
    gap: 5px;
    align-items: center;
    box-shadow: var(--shadow);
  }

  .dot {
    width: 7px;
    height: 7px;
    background: var(--verde-light);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }

  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
    40% { transform: translateY(-6px); opacity: 1; }
  }

  .input-area {
    background: var(--bianco);
    border-top: 1px solid var(--grigio-border);
    padding: 16px 24px;
    flex-shrink: 0;
  }

  .input-wrapper {
    max-width: 820px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .attachments-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .attachment-preview {
    position: relative;
    display: inline-flex;
  }

  .attachment-preview img {
    width: 64px;
    height: 64px;
    object-fit: cover;
    border-radius: 8px;
    border: 1px solid var(--grigio-border);
  }

  .attachment-preview .remove-btn {
    position: absolute;
    top: -6px;
    right: -6px;
    width: 18px;
    height: 18px;
    background: #dc3545;
    color: white;
    border: none;
    border-radius: 50%;
    font-size: 11px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  .input-box {
    flex: 1;
    border: 1.5px solid var(--grigio-border);
    border-radius: var(--radius);
    padding: 11px 14px;
    font-size: 15px;
    font-family: inherit;
    resize: none;
    outline: none;
    transition: border-color 0.2s;
    min-height: 48px;
    max-height: 140px;
    line-height: 1.5;
    color: var(--testo);
  }

  .input-box:focus {
    border-color: var(--verde-light);
  }

  .input-box::placeholder { color: #aaa; }

  .btn-attach {
    width: 48px;
    height: 48px;
    border: 1.5px solid var(--grigio-border);
    border-radius: var(--radius);
    background: white;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    color: var(--grigio-testo);
    flex-shrink: 0;
  }

  .btn-attach:hover {
    border-color: var(--verde-light);
    color: var(--verde);
    background: var(--verde-pale);
  }

  .btn-send {
    width: 48px;
    height: 48px;
    background: var(--verde);
    border: none;
    border-radius: var(--radius);
    color: white;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .btn-send:hover { background: var(--verde-light); }
  .btn-send:active { transform: scale(0.96); }
  .btn-send:disabled { background: #ccc; cursor: not-allowed; }

  .hint {
    font-size: 12px;
    color: #aaa;
    text-align: center;
    margin-top: 4px;
  }

  .welcome {
    text-align: center;
    margin: auto;
    padding: 40px 20px;
  }

  .welcome-icon {
    width: 72px;
    height: 72px;
    background: var(--verde-pale);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 16px;
    font-size: 32px;
  }

  .welcome h2 {
    font-size: 22px;
    font-weight: 600;
    color: var(--verde-dark);
    margin-bottom: 8px;
  }

  .welcome p {
    color: var(--grigio-testo);
    font-size: 15px;
    max-width: 400px;
    margin: 0 auto 24px;
    line-height: 1.6;
  }

  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
  }

  .chip {
    background: white;
    border: 1px solid var(--grigio-border);
    border-radius: 20px;
    padding: 8px 16px;
    font-size: 13px;
    cursor: pointer;
    color: var(--verde-dark);
    transition: all 0.2s;
    font-family: inherit;
  }

  .chip:hover {
    background: var(--verde-pale);
    border-color: var(--verde-light);
  }

  .pdf-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: #fff3cd;
    border: 1px solid #ffc107;
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 13px;
    color: #856404;
    margin-top: 6px;
  }

  #fileInput { display: none; }

  .api-missing {
    background: #fff3cd;
    border: 1px solid #ffc107;
    border-radius: var(--radius);
    padding: 16px 20px;
    margin: 20px auto;
    max-width: 500px;
    text-align: center;
    font-size: 14px;
    color: #856404;
  }

  .api-missing input {
    width: 100%;
    margin-top: 10px;
    padding: 8px 12px;
    border: 1px solid #ffc107;
    border-radius: 8px;
    font-size: 14px;
    font-family: inherit;
  }

  .api-missing button {
    margin-top: 8px;
    background: var(--verde);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 8px 20px;
    cursor: pointer;
    font-size: 14px;
    font-family: inherit;
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="logo-circle">UT</div>
    <div>
      <div class="header-title">Ufficio Tecnico</div>
      <div class="header-sub">Assistente componenti industriali</div>
    </div>
  </div>
  <div>
    <span class="status-dot"></span>
    <span class="status-text">Marco è online</span>
  </div>
</header>

<div class="chat-container" id="chat">
  <div class="welcome" id="welcome">
    <div class="welcome-icon">🔧</div>
    <h2>Ciao, sono Marco</h2>
    <p>Tecnico commerciale senior — componenti industriali. Mandami una foto, un codice articolo o descrivimi cosa ti serve.</p>
    <div class="chips">
      <button class="chip" onclick="sendChip(this)">📷 Ho una foto del pezzo</button>
      <button class="chip" onclick="sendChip(this)">🔢 Ho il codice articolo</button>
      <button class="chip" onclick="sendChip(this)">📝 Devo descrivere il componente</button>
      <button class="chip" onclick="sendChip(this)">📄 Ho una scheda tecnica PDF</button>
    </div>
  </div>
</div>

<input type="file" id="fileInput" accept="image/*,.pdf" multiple>

<div class="input-area">
  <div class="input-wrapper">
    <div class="attachments-row" id="attachmentsRow"></div>
    <div class="input-row">
      <button class="btn-attach" onclick="document.getElementById('fileInput').click()" title="Allega foto o PDF">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
        </svg>
      </button>
      <textarea class="input-box" id="userInput" placeholder="Scrivi un codice, descrivi il pezzo, o allega una foto..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="btn-send" id="sendBtn" onclick="sendMessage()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
    <div class="hint">Invio per inviare • Shift+Invio per andare a capo</div>
  </div>
</div>

<script>
const SYSTEM_PROMPT = `Sei Marco, un tecnico commerciale senior specializzato in componenti industriali con 20 anni di esperienza. Lavori per un'azienda che vende componenti multimarche e il tuo compito è aiutare a identificare e selezionare l'articolo giusto tra migliaia di referenze di catalogo.

Il tuo modo di lavorare:
- Quando ricevi una foto, un codice o una descrizione, analizzi con occhio tecnico e fai le domande giuste per capire esattamente cosa serve
- Non dai mai una risposta vaga: sei preciso, tecnico, pratico
- Quando hai capito cosa serve, presenti SEMPRE le opzioni disponibili raggruppate per marca, con codice articolo, descrizione tecnica e prezzo
- Se non hai abbastanza informazioni per essere preciso, fai UNA domanda alla volta — la più importante — prima di procedere
- Ragioni ad alta voce: spieghi perché stai proponendo quell'articolo e non un altro
- Se noti che il cliente sta cercando la cosa sbagliata per la sua applicazione, glielo dici chiaramente e proponi l'alternativa corretta

Quando ricevi una richiesta:
1. Identifica il componente (tipo, famiglia, caratteristiche tecniche)
2. Chiedi le specifiche mancanti se necessario (dimensioni, carico, materiale, ambiente di utilizzo)
3. Cerca nel catalogo e presenta le opzioni disponibili in questo formato:

---
ARTICOLO TROVATO: [nome componente]

MARCA A — [Nome Marca]
  Codice: [codice]
  Descrizione: [descrizione tecnica]
  Prezzo: [prezzo]
  Note: [perché sceglierla]

MARCA B — [Nome Marca]
  Codice: [codice]
  Descrizione: [descrizione tecnica]
  Prezzo: [prezzo]
  Note: [perché sceglierla]

CONSIGLIO TECNICO: [quale sceglieresti tu e perché]
---

Il tuo tono è quello di un collega esperto: diretto, competente, mai supponente. Parli in italiano. Se un cliente ti manda una foto poco chiara, chiedi una foto migliore specificando da quale angolazione.`;

let API_KEY = localStorage.getItem('marco_api_key') || '';
let conversationHistory = [];
let pendingFiles = [];
let isLoading = false;

if (!API_KEY) {
  showApiKeyPrompt();
}

function showApiKeyPrompt() {
  const chat = document.getElementById('chat');
  const existing = document.getElementById('apiPrompt');
  if (existing) return;
  const div = document.createElement('div');
  div.id = 'apiPrompt';
  div.className = 'api-missing';
  div.innerHTML = `
    <strong>⚙️ Configura la tua API Key</strong><br>
    Inserisci la chiave Anthropic per attivare Marco.<br>
    <input type="password" id="apiKeyInput" placeholder="sk-ant-..." />
    <br>
    <button onclick="saveApiKey()">Salva e attiva Marco</button>
  `;
  chat.appendChild(div);
}

function saveApiKey() {
  const val = document.getElementById('apiKeyInput').value.trim();
  if (!val.startsWith('sk-')) {
    alert('La chiave non sembra valida. Inizia con sk-ant-...');
    return;
  }
  API_KEY = val;
  localStorage.setItem('marco_api_key', val);
  const el = document.getElementById('apiPrompt');
  if (el) el.remove();
  addMessage('marco', 'API key salvata! Ciao, sono Marco — tecnico commerciale senior. Mandami un codice, una foto o descrivimi il pezzo che cerchi. 💪');
}

document.getElementById('fileInput').addEventListener('change', function(e) {
  const files = Array.from(e.target.files);
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = function(ev) {
      pendingFiles.push({ name: file.name, type: file.type, data: ev.target.result });
      renderAttachments();
    };
    reader.readAsDataURL(file);
  });
  this.value = '';
});

function renderAttachments() {
  const row = document.getElementById('attachmentsRow');
  row.innerHTML = '';
  pendingFiles.forEach((f, i) => {
    const div = document.createElement('div');
    div.className = 'attachment-preview';
    if (f.type.startsWith('image/')) {
      div.innerHTML = `<img src="${f.data}" alt="${f.name}"><button class="remove-btn" onclick="removeFile(${i})">×</button>`;
    } else {
      div.innerHTML = `<div class="pdf-badge">📄 ${f.name}</div><button class="remove-btn" onclick="removeFile(${i})" style="top:0;right:0">×</button>`;
    }
    row.appendChild(div);
  });
}

function removeFile(i) {
  pendingFiles.splice(i, 1);
  renderAttachments();
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 140) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function sendChip(btn) {
  const text = btn.textContent.replace(/^[^\s]+\s/, '');
  document.getElementById('userInput').value = text;
  sendMessage();
}

function addMessage(role, text, imageData) {
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();

  const chat = document.getElementById('chat');
  const wrap = document.createElement('div');
  wrap.className = `message ${role}`;

  const initials = role === 'marco' ? 'M' : 'TU';
  const avClass = role === 'marco' ? 'marco-av' : 'user-av';

  let bubbleContent = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  let extra = '';
  if (imageData) {
    extra = `<img src="${imageData}" alt="allegato">`;
  }

  wrap.innerHTML = `
    <div class="avatar ${avClass}">${initials}</div>
    <div class="bubble">${bubbleContent}${extra}</div>
  `;
  chat.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;
}

function showTyping() {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'typing-indicator';
  div.id = 'typing';
  div.innerHTML = `
    <div class="avatar marco-av">M</div>
    <div class="typing-dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  `;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function hideTyping() {
  const el = document.getElementById('typing');
  if (el) el.remove();
}

async function sendMessage() {
  if (isLoading) return;
  if (!API_KEY) { showApiKeyPrompt(); return; }

  const input = document.getElementById('userInput');
  const text = input.value.trim();
  const files = [...pendingFiles];

  if (!text && files.length === 0) return;

  input.value = '';
  input.style.height = 'auto';
  pendingFiles = [];
  renderAttachments();

  const imageFile = files.find(f => f.type.startsWith('image/'));
  addMessage('user', text || '(allegato)', imageFile ? imageFile.data : null);

  const userContent = buildUserContent(text, files);
  conversationHistory.push({ role: 'user', content: userContent });

  isLoading = true;
  document.getElementById('sendBtn').disabled = true;
  showTyping();

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': API_KEY,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 2048,
        system: SYSTEM_PROMPT,
        messages: conversationHistory
      })
    });

    const data = await response.json();

    if (data.error) {
      hideTyping();
      addMessage('marco', '⚠️ Errore API: ' + data.error.message);
      if (data.error.type === 'authentication_error') {
        localStorage.removeItem('marco_api_key');
        API_KEY = '';
      }
    } else {
      const reply = data.content[0].text;
      conversationHistory.push({ role: 'assistant', content: reply });
      hideTyping();
      addMessage('marco', reply);
    }
  } catch (err) {
    hideTyping();
    addMessage('marco', '⚠️ Errore di connessione. Controlla la tua API key e la connessione internet.');
  }

  isLoading = false;
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('userInput').focus();
}

function buildUserContent(text, files) {
  if (files.length === 0) return text;

  const parts = [];

  files.forEach(f => {
    if (f.type.startsWith('image/')) {
      const b64 = f.data.split(',')[1];
      const mediaType = f.type;
      parts.push({
        type: 'image',
        source: { type: 'base64', media_type: mediaType, data: b64 }
      });
    } else if (f.type === 'application/pdf') {
      const b64 = f.data.split(',')[1];
      parts.push({
        type: 'document',
        source: { type: 'base64', media_type: 'application/pdf', data: b64 }
      });
    }
  });

  if (text) {
    parts.push({ type: 'text', text: text });
  }

  return parts;
}
</script>
</body>
</html>
